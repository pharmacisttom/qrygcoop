<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตั้งค่าระบบ | สหกรณ์ออมทรัพย์สาธารณสุขระยอง</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0d6efd, #198754);
            color: white;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
        }
        .logo-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 10px auto;
        }
        .sidebar .nav-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sidebar .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .sidebar .nav-item.active {
            background: rgba(255, 255, 255, 0.2);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        .table th { background-color: #f8fafc; font-weight: 600; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                overflow-x: hidden;
            }
            .sidebar { width: 100%; padding: 15px; }
            .logo-box { display: flex; align-items: center; text-align: left; margin-bottom: 15px; }
            .logo-icon { margin: 0 15px 0 0; width: 50px; height: 50px; font-size: 24px; }
            .nav-item { display: inline-block !important; width: auto; margin-bottom: 5px; }
            .main-content { padding: 15px; }
            .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo-box">
            <div class="logo-icon">⚙️</div>
            <h5 class="fw-bold mb-0">ระบบจัดการคิว</h5>
            <small id="adminNameDisplay">กำลังตรวจสอบ...</small>
        </div>
        <a href="admin.html" class="nav-item text-decoration-none text-white d-block" style="opacity: 0.8;">📋 จัดการคิววันนี้</a>
        <a href="calendar.html" class="nav-item text-decoration-none text-white d-block" style="opacity: 0.8;">📅 ปฏิทินการจอง</a>
        <a href="dashboard.html" class="nav-item text-decoration-none text-white d-block" style="opacity: 0.8;">📊 ผลประเมิน (Dashboard)</a>
        <a href="settings.html" class="nav-item active text-decoration-none text-white d-block">⚙️ ตั้งค่าระบบ</a>
        
        <div class="mt-auto text-center">
            <button class="btn btn-sm btn-outline-light w-100 mb-3" onclick="logout()" style="border-radius: 12px; font-weight: 500;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-right me-1" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/><path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/></svg> ออกจากระบบ
            </button>
            <small style="opacity: 0.7;">Digital Cooperative v1.0</small>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold text-primary mb-1">ตั้งค่าช่วงเวลาการจองคิว</h3>
                <div class="text-muted">กำหนดเวลาและจำนวนจำกัดคิวสูงสุดในแต่ละช่วงเวลา</div>
            </div>
            <button class="btn btn-primary fw-bold" onclick="showAddTimeModal()">+ เพิ่มช่วงเวลาใหม่</button>
        </div>

        <div class="card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>เวลา</th>
                            <th>จำนวนรับคิวสูงสุด / วัน</th>
                            <th>สถานะการเปิดรับจอง</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="slotsTableBody">
                        <tr><td colspan="4" class="text-center text-muted">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal เพิ่ม/แก้ไขเวลา -->
    <div class="modal fade" id="timeSlotModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: 16px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalTitle">เพิ่มช่วงเวลาใหม่</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="slotId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">ช่วงเวลา (เช่น 09:00)</label>
                        <input type="time" id="slotTime" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">รับคิวสูงสุด (คน/วัน)</label>
                        <input type="number" id="slotCapacity" class="form-control" min="1" value="5" required>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="slotActive" checked>
                        <label class="form-check-label" for="slotActive">เปิดรับจองเวลานี้</label>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
                    <button type="button" class="btn btn-primary" onclick="saveTimeSlot()">บันทึกข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (for modal) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const SUPABASE_URL = 'https://mimtgrlavzwkjhfvakug.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pbXRncmxhdnp3a2poZnZha3VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDQxMTUsImV4cCI6MjA5NzA4MDExNX0._csVd8NZjCgzYACeCOPIbXY_NEZ3z9iPFIh2DneGbzQ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let timeSlotModal;

        // เช็ค Session
        const sessionStr = localStorage.getItem('admin_session');
        if (!sessionStr) {
            window.location.href = 'login.html';
        } else {
            const session = JSON.parse(sessionStr);
            document.getElementById('adminNameDisplay').innerText = 'เจ้าหน้าที่: ' + session.fullname;
        }

        function logout() {
            localStorage.removeItem('admin_session');
            window.location.href = 'login.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            timeSlotModal = new bootstrap.Modal(document.getElementById('timeSlotModal'));
            loadTimeSlots();
        });

        async function loadTimeSlots() {
            const { data, error } = await supabaseClient.from('time_slots').select('*').order('time_string', { ascending: true });
            
            if (error) {
                console.error(error);
                document.getElementById('slotsTableBody').innerHTML = '<tr><td colspan="4" class="text-center text-danger">เกิดข้อผิดพลาดในการโหลดข้อมูล โปรดนำสคริปต์ SQL ไปรันในฐานข้อมูลก่อน</td></tr>';
                return;
            }

            const tbody = document.getElementById('slotsTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">ยังไม่มีช่วงเวลาในระบบ</td></tr>';
                return;
            }

            data.forEach(slot => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="fw-bold fs-5">${slot.time_string} น.</td>
                    <td><span class="badge bg-primary fs-6">${slot.max_capacity} คน</span></td>
                    <td>
                        <div class="form-check form-switch fs-5">
                            <input class="form-check-input" type="checkbox" ${slot.is_active ? 'checked' : ''} onchange="toggleActive(${slot.id}, this.checked)">
                        </div>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-secondary me-2" onclick="showEditModal(${slot.id}, '${slot.time_string}', ${slot.max_capacity}, ${slot.is_active})">แก้ไข</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteSlot(${slot.id}, '${slot.time_string}')">ลบ</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showAddTimeModal() {
            document.getElementById('modalTitle').innerText = 'เพิ่มช่วงเวลาใหม่';
            document.getElementById('slotId').value = '';
            document.getElementById('slotTime').value = '09:00';
            document.getElementById('slotCapacity').value = '5';
            document.getElementById('slotActive').checked = true;
            timeSlotModal.show();
        }

        function showEditModal(id, time, capacity, isActive) {
            document.getElementById('modalTitle').innerText = 'แก้ไขช่วงเวลา';
            document.getElementById('slotId').value = id;
            document.getElementById('slotTime').value = time;
            document.getElementById('slotCapacity').value = capacity;
            document.getElementById('slotActive').checked = isActive;
            timeSlotModal.show();
        }

        async function saveTimeSlot() {
            const id = document.getElementById('slotId').value;
            const time = document.getElementById('slotTime').value;
            const capacity = document.getElementById('slotCapacity').value;
            const isActive = document.getElementById('slotActive').checked;

            if (!time || !capacity) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกเวลาและจำนวนให้ครบถ้วน', 'warning');
                return;
            }

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

            try {
                if (id) {
                    // Update
                    const { error } = await supabaseClient.from('time_slots').update({
                        time_string: time,
                        max_capacity: parseInt(capacity),
                        is_active: isActive
                    }).eq('id', id);
                    if (error) throw error;
                } else {
                    // Insert
                    const { error } = await supabaseClient.from('time_slots').insert([{
                        time_string: time,
                        max_capacity: parseInt(capacity),
                        is_active: isActive
                    }]);
                    if (error) throw error;
                }
                
                timeSlotModal.hide();
                Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1500, showConfirmButton: false });
                loadTimeSlots();
            } catch (err) {
                Swal.fire('เกิดข้อผิดพลาด', 'อาจมีเวลานี้อยู่ในระบบแล้ว', 'error');
            }
        }

        async function toggleActive(id, newState) {
            await supabaseClient.from('time_slots').update({ is_active: newState }).eq('id', id);
        }

        async function deleteSlot(id, time) {
            Swal.fire({
                title: `ยืนยันการลบเวลา ${time} น.?`,
                text: "ถ้าลบไปแล้วจะไม่ปรากฏในหน้าจองคิว",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'ใช่, ลบเลย!',
                cancelButtonText: 'ยกเลิก'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    await supabaseClient.from('time_slots').delete().eq('id', id);
                    Swal.fire('ลบสำเร็จ!', '', 'success');
                    loadTimeSlots();
                }
            });
        }
    </script>
</body>
</html>
