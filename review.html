<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินความพึงพอใจ | สหกรณ์ออมทรัพย์สาธารณสุขระยอง</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #198754);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }
        
        .main-card {
            width: 100%;
            max-width: 500px;
            border: none;
            border-radius: 28px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, .25);
            background: white;
        }

        .system-icon {
            width: 76px;
            height: 76px;
            border-radius: 24px;
            background: linear-gradient(135deg, #0d6efd, #198754);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            margin: 0 auto 18px auto;
            color: white;
            box-shadow: 0 8px 15px rgba(13, 110, 253, 0.3);
        }

        .rating-group {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 15px;
        }

        .rating-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #1e293b;
        }
        
        .stars {
            display: flex;
            justify-content: center;
            flex-direction: row-reverse;
            gap: 5px;
        }

        .stars input { display: none; }
        .stars label.star-btn {
            font-size: 2.5rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.2s;
            margin: 0;
            line-height: 1;
        }

        .stars label.star-btn:hover,
        .stars label.star-btn:hover ~ label.star-btn,
        .stars input:checked ~ label.star-btn {
            color: #fbbf24;
            transform: scale(1.1);
        }

        .form-control {
            border-radius: 16px;
            padding: 12px 15px;
        }

        .btn-primary {
            border-radius: 16px;
            padding: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, #0d6efd, #198754);
            border: none;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }

        .success-view { display: none; text-align: center; }
        .success-icon { font-size: 5rem; color: #198754; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container px-3">
        <div class="card main-card mx-auto">
            <div class="card-body p-4 p-md-5">

                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="system-icon">⭐</div>
                    <h4 class="fw-bold text-primary mb-1">แบบประเมินความพึงพอใจ</h4>
                    <div class="text-muted">สหกรณ์ออมทรัพย์สาธารณสุขระยอง</div>
                </div>

                <div id="formView">
                    <form id="reviewForm">
                        
                        <div class="rating-group">
                            <label>1. ความรวดเร็วในการให้บริการ</label>
                            <div class="stars">
                                <input type="radio" id="q1-5" name="q1" value="5" required><label class="star-btn" for="q1-5">★</label>
                                <input type="radio" id="q1-4" name="q1" value="4"><label class="star-btn" for="q1-4">★</label>
                                <input type="radio" id="q1-3" name="q1" value="3"><label class="star-btn" for="q1-3">★</label>
                                <input type="radio" id="q1-2" name="q1" value="2"><label class="star-btn" for="q1-2">★</label>
                                <input type="radio" id="q1-1" name="q1" value="1"><label class="star-btn" for="q1-1">★</label>
                            </div>
                        </div>

                        <div class="rating-group">
                            <label>2. ความสุภาพและการให้ข้อมูลของเจ้าหน้าที่</label>
                            <div class="stars">
                                <input type="radio" id="q2-5" name="q2" value="5" required><label class="star-btn" for="q2-5">★</label>
                                <input type="radio" id="q2-4" name="q2" value="4"><label class="star-btn" for="q2-4">★</label>
                                <input type="radio" id="q2-3" name="q2" value="3"><label class="star-btn" for="q2-3">★</label>
                                <input type="radio" id="q2-2" name="q2" value="2"><label class="star-btn" for="q2-2">★</label>
                                <input type="radio" id="q2-1" name="q2" value="1"><label class="star-btn" for="q2-1">★</label>
                            </div>
                        </div>

                        <div class="rating-group">
                            <label>3. ความสะดวกของระบบออนไลน์</label>
                            <div class="stars">
                                <input type="radio" id="q3-5" name="q3" value="5" required><label class="star-btn" for="q3-5">★</label>
                                <input type="radio" id="q3-4" name="q3" value="4"><label class="star-btn" for="q3-4">★</label>
                                <input type="radio" id="q3-3" name="q3" value="3"><label class="star-btn" for="q3-3">★</label>
                                <input type="radio" id="q3-2" name="q3" value="2"><label class="star-btn" for="q3-2">★</label>
                                <input type="radio" id="q3-1" name="q3" value="1"><label class="star-btn" for="q3-1">★</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">ข้อเสนอแนะเพิ่มเติม</label>
                            <textarea id="comments" class="form-control" rows="3" placeholder="พิมพ์ข้อเสนอแนะเพื่อการพัฒนา..."></textarea>
                        </div>

                        <button type="submit" id="btnSubmit" class="btn btn-primary w-100">
                            ส่งแบบประเมิน
                        </button>
                    </form>
                </div>

                <div id="successView" class="success-view">
                    <div class="success-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                        </svg>
                    </div>
                    <h3 class="fw-bold text-success">ขอบคุณสำหรับคำติชม</h3>
                    <p class="text-muted">ข้อมูลของท่านจะนำไปใช้ในการพัฒนาการให้บริการต่อไป</p>
                    <button class="btn btn-outline-success w-100 fw-bold mt-4" style="border-radius: 16px; padding: 13px;" onclick="closeApp()">ปิดหน้าต่างนี้</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mimtgrlavzwkjhfvakug.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pbXRncmxhdnp3a2poZnZha3VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDQxMTUsImV4cCI6MjA5NzA4MDExNX0._csVd8NZjCgzYACeCOPIbXY_NEZ3z9iPFIh2DneGbzQ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = {};

        function closeApp() {
            try {
                if(typeof liff !== 'undefined' && liff.isInClient()) {
                    liff.closeWindow();
                } else {
                    window.location.reload(); // รีเฟรชหน้าเว็บแทนถ้าเปิดในเบราว์เซอร์ปกติ
                }
            } catch(e) {
                window.location.reload();
            }
        }
        
        async function initializeLiff() {
            try {
                await liff.init({ liffId: '2010466037-2FQbMDY5' });
                if (!liff.isLoggedIn()) { 
                    liff.login({ redirectUri: window.location.href }); 
                    return; 
                }
                currentUser = await liff.getProfile();

                // ตรวจสอบว่าเคยประเมินคิวนี้ไปแล้วหรือไม่
                if (queueId) {
                    const { data, error } = await supabaseClient
                        .from('reviews')
                        .select('id')
                        .eq('queue_id', queueId)
                        .limit(1);
                    
                    if (data && data.length > 0) {
                        document.getElementById('formView').style.display = 'none';
                        document.getElementById('successView').innerHTML = `
                            <div class="success-icon" style="color: #0d6efd;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-info-circle-fill" viewBox="0 0 16 16">
                                  <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
                                </svg>
                            </div>
                            <h3 class="fw-bold text-primary">ประเมินไปแล้ว</h3>
                            <p class="text-muted">คิวนี้ได้รับการประเมินความพึงพอใจเรียบร้อยแล้ว ขอบคุณครับ</p>
                            <button class="btn btn-outline-primary w-100 fw-bold mt-4" style="border-radius: 16px; padding: 13px;" onclick="closeApp()">ปิดหน้าต่างนี้</button>
                        `;
                        document.getElementById('successView').style.display = 'block';
                    }
                }
            } catch (err) { 
                console.error(err);
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อ LINE ได้ กรุณาเปิดลิงก์นี้ผ่านแอป LINE', 'error');
            }
        }

        // รับ queue_id จาก URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const queueIdParam = urlParams.get('queue_id');
        const queueId = (queueIdParam && queueIdParam !== 'null') ? parseInt(queueIdParam) : null;

        document.getElementById('reviewForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // ดึงค่า rating
            const q1 = document.querySelector('input[name="q1"]:checked');
            const q2 = document.querySelector('input[name="q2"]:checked');
            const q3 = document.querySelector('input[name="q3"]:checked');
            const comments = document.getElementById('comments').value;

            if(!q1 || !q2 || !q3) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณาให้คะแนนให้ครบทุกหัวข้อ', 'warning');
                return;
            }

            if (!currentUser || !currentUser.userId) {
                Swal.fire('ข้อผิดพลาด', 'ไม่พบข้อมูลผู้ใช้ LINE กรุณาโหลดหน้าเว็บใหม่อีกครั้ง', 'error');
                return;
            }

            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'กำลังส่งข้อมูล...';

            try {
                // Save to Supabase
                const { error } = await supabaseClient.from('reviews').insert([{
                    queue_id: queueId,
                    user_id: currentUser.userId,
                    rating_speed: parseInt(q1.value),
                    rating_service: parseInt(q2.value),
                    rating_system: parseInt(q3.value),
                    comments: comments
                }]);
                if (error) throw error;

                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';

            } catch (error) {
                Swal.fire('เกิดข้อผิดพลาด', error.message, 'error');
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'ส่งแบบประเมิน';
            }
        });

        window.onload = initializeLiff;
    </script>
</body>
</html>
