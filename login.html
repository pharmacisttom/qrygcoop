<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ (สำหรับเจ้าหน้าที่) | สหกรณ์ออมทรัพย์สาธารณสุขระยอง</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #198754);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            border: none;
            border-radius: 28px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, .25);
        }
        
        .system-icon {
            width: 76px;
            height: 76px;
            border-radius: 24px;
            background: linear-gradient(135deg, #0d6efd, #198754);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            margin: 0 auto 18px auto;
            color: white;
            box-shadow: 0 8px 15px rgba(13, 110, 253, 0.3);
        }
        
        .form-control {
            border-radius: 16px;
            padding: 13px 15px;
        }
        
        .btn-login {
            border-radius: 16px;
            padding: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, #0d6efd, #198754);
            border: none;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.4);
        }
        
        .small-muted {
            font-size: 0.9rem;
            color: #6c757d;
        }
    </style>
</head>

<body>

    <div class="container px-3">
        <div class="card login-card mx-auto">
            <div class="card-body p-4 p-md-5">

                <div class="text-center mb-4">
                    <div class="system-icon">👩‍💻</div>
                    <h4 class="fw-bold text-primary mb-1">เข้าสู่ระบบ</h4>
                    <div class="text-muted">ระบบจัดการคิวออนไลน์ (Admin)</div>
                    <div class="small-muted">สหกรณ์ออมทรัพย์สาธารณสุขระยอง</div>
                </div>

                <form id="loginForm" autocomplete="off">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" id="username" class="form-control" required placeholder="กรอก Username">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="กรอก Password">
                    </div>

                    <button type="submit" id="btnLogin" class="btn btn-primary w-100 btn-login">
                        เข้าสู่ระบบ
                    </button>
                    
                    <div class="text-center mt-3">
                        <a href="index.html" class="text-decoration-none text-muted" style="font-size: 0.9rem;">
                            ← กลับไปหน้าหลัก
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mimtgrlavzwkjhfvakug.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pbXRncmxhdnp3a2poZnZha3VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDQxMTUsImV4cCI6MjA5NzA4MDExNX0._csVd8NZjCgzYACeCOPIbXY_NEZ3z9iPFIh2DneGbzQ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // เช็คว่ามี session อยู่แล้วหรือไม่
        window.onload = () => {
            const adminUser = localStorage.getItem('admin_session');
            if (adminUser) {
                window.location.href = 'admin.html';
            }
        };

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');

            if (!username || !password) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอก Username และ Password', 'warning');
                return;
            }

            btnLogin.disabled = true;
            btnLogin.innerText = 'กำลังตรวจสอบ...';

            try {
                // ค้นหาผู้ใช้ใน Supabase (ใช้ตาราง staff_users)
                const { data, error } = await supabaseClient
                    .from('staff_users')
                    .select('id, username, fullname, role, permissions')
                    .eq('username', username)
                    .eq('password_hash', password)
                    .single();

                if (error) {
                    if (error.code === 'PGRST116') {
                        Swal.fire({
                            icon: 'error',
                            title: 'เข้าสู่ระบบไม่สำเร็จ',
                            text: 'Username หรือ Password ไม่ถูกต้อง'
                        });
                    } else {
                        console.error("Supabase Error:", error);
                        Swal.fire({
                            icon: 'error',
                            title: 'ยังไม่ได้อัปเดตฐานข้อมูล',
                            text: 'กรุณานำโค้ด SQL ล่าสุดไปรันใน Supabase ก่อนครับ (' + error.message + ')'
                        });
                    }
                } else if (!data) {
                    Swal.fire({
                        icon: 'error',
                        title: 'เข้าสู่ระบบไม่สำเร็จ',
                        text: 'Username หรือ Password ไม่ถูกต้อง'
                    });
                } else {
                    // สร้าง Session (เก็บลง localStorage)
                    localStorage.setItem('admin_session', JSON.stringify({
                        id: data.id,
                        username: data.username,
                        fullname: data.fullname,
                        role: data.role,
                        permissions: data.permissions || {
                            manage_queues: true,
                            view_calendar: true,
                            view_dashboard: true,
                            manage_settings: true
                        },
                        login_time: new Date().getTime()
                    }));

                    Swal.fire({
                        icon: 'success',
                        title: 'เข้าสู่ระบบสำเร็จ',
                        text: 'ยินดีต้อนรับ ' + data.fullname,
                        timer: 1200,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'admin.html';
                    });
                }

            } catch (err) {
                console.error(err);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            } finally {
                btnLogin.disabled = false;
                btnLogin.innerText = 'เข้าสู่ระบบ';
            }
        });
    </script>
</body>
</html>
