<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ปฏิทินการจอง | สหกรณ์ออมทรัพย์สาธารณสุขระยอง</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/th.js"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0d6efd, #198754);
            color: white;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
        }
        .logo-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 10px auto;
        }
        .sidebar .nav-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sidebar .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .sidebar .nav-item.active {
            background: rgba(255, 255, 255, 0.2);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* Calendar Card */
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            background: white;
        }
        
        #calendar {
            max-width: 100%;
            margin: 0 auto;
            min-height: 700px;
        }
        
        /* Event styles */
        .fc-event {
            border-radius: 4px;
            border: none;
            padding: 2px 4px;
            font-size: 0.85em;
        }
        .status-WAITING { background-color: #ffc107 !important; color: #000 !important; }
        .status-CALLING { background-color: #0dcaf0 !important; color: #000 !important; }
        .status-DONE { background-color: #198754 !important; color: #fff !important; }
        .status-CANCELLED { background-color: #dc3545 !important; color: #fff !important; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                overflow-x: hidden;
            }
            .sidebar {
                width: 100%;
                padding: 15px;
            }
            .logo-box {
                display: flex;
                align-items: center;
                text-align: left;
                margin-bottom: 15px;
            }
            .logo-icon {
                margin: 0 15px 0 0;
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
            .nav-item {
                display: inline-block !important;
                width: auto;
                margin-bottom: 5px;
            }
            .main-content {
                padding: 15px;
            }
            #calendar {
                min-height: 500px;
            }
            .fc-toolbar {
                flex-direction: column;
                gap: 10px;
            }
            .fc-toolbar-chunk {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo-box">
            <div class="logo-icon">👩‍💻</div>
            <h5 class="fw-bold mb-0">ระบบจัดการคิว</h5>
            <small id="adminNameDisplay">กำลังตรวจสอบ...</small>
        </div>
        <a href="admin.html" class="nav-item text-decoration-none text-white d-block" style="opacity: 0.8;">📋 จัดการคิววันนี้</a>
        <a href="calendar.html" class="nav-item active text-decoration-none text-white d-block">📅 ปฏิทินการจอง</a>
        <a href="dashboard.html" class="nav-item text-decoration-none text-white d-block" style="opacity: 0.8;">📊 ผลประเมิน (Dashboard)</a>
        <a href="settings.html" class="nav-item text-decoration-none text-white d-block" style="opacity: 0.8;">⚙️ ตั้งค่าระบบ</a>
        
        <div class="mt-auto text-center">
            <button class="btn btn-sm btn-outline-light w-100 mb-3" onclick="logout()" style="border-radius: 12px; font-weight: 500;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-right me-1" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/><path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/></svg> ออกจากระบบ
            </button>
            <small style="opacity: 0.7;">Digital Cooperative v1.0</small>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold text-primary mb-1">ปฏิทินการจองคิวรับบริการ</h3>
                <div class="text-muted">ภาพรวมรายการคิวทั้งหมดในระบบ</div>
            </div>
            <div>
                <span class="badge bg-warning text-dark me-2">รอเรียก</span>
                <span class="badge bg-info text-dark me-2">กำลังเรียก</span>
                <span class="badge bg-success me-2">เสร็จสิ้น</span>
                <span class="badge bg-danger">ยกเลิก</span>
            </div>
        </div>

        <div class="card p-4">
            <div id="calendar"></div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const SUPABASE_URL = 'https://mimtgrlavzwkjhfvakug.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pbXRncmxhdnp3a2poZnZha3VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDQxMTUsImV4cCI6MjA5NzA4MDExNX0._csVd8NZjCgzYACeCOPIbXY_NEZ3z9iPFIh2DneGbzQ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // เช็ค Session
        const sessionStr = localStorage.getItem('admin_session');
        if (!sessionStr) {
            window.location.href = 'login.html';
        } else {
            const session = JSON.parse(sessionStr);
            document.getElementById('adminNameDisplay').innerText = 'เจ้าหน้าที่: ' + session.fullname;
        }

        function logout() {
            Swal.fire({
                title: 'ยืนยันออกจากระบบ?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'ออกจากระบบ',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('admin_session');
                    window.location.href = 'login.html';
                }
            });
        }

        // โหลดข้อมูลและสร้างปฏิทิน
        document.addEventListener('DOMContentLoaded', async function() {
            var calendarEl = document.getElementById('calendar');
            
            // สร้าง instance ปฏิทินก่อน
            var calendar = new FullCalendar.Calendar(calendarEl, {
                locale: 'th',
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                themeSystem: 'bootstrap5',
                height: 'auto',
                eventClick: function(info) {
                    Swal.fire({
                        title: 'รายละเอียดคิว: ' + info.event.extendedProps.queueNumber,
                        html: `
                            <div class="text-start mt-3">
                                <b>ชื่อสมาชิก:</b> ${info.event.title.split('-')[1] || info.event.title}<br>
                                <b>บริการ:</b> ${info.event.extendedProps.service}<br>
                                <b>เวลา:</b> ${info.event.start.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'})} น.<br>
                                <b>สถานะ:</b> ${info.event.extendedProps.status}
                            </div>
                        `,
                        icon: 'info',
                        confirmButtonText: 'ปิด'
                    });
                }
            });
            calendar.render();

            // ดึงข้อมูลคิว
            Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            
            try {
                const { data, error } = await supabaseClient.from('queues').select('*');
                if (error) throw error;
                
                // แปลงข้อมูลให้อยู่ในรูปแบบ Event ของ FullCalendar
                const events = data.map(q => {
                    // booking_date = "YYYY-MM-DD", booking_time = "HH:MM"
                    const startDateTime = `${q.booking_date}T${q.booking_time}:00`;
                    
                    return {
                        id: q.id,
                        title: `${q.queue_number} - ${q.user_name}`,
                        start: startDateTime,
                        classNames: [`status-${q.status}`],
                        extendedProps: {
                            status: q.status,
                            service: q.service_type,
                            queueNumber: q.queue_number
                        }
                    };
                });
                
                calendar.addEventSource(events);
                Swal.close();
                
            } catch (err) {
                console.error(err);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถโหลดข้อมูลปฏิทินได้', 'error');
            }
        });
    </script>
</body>
</html>
